<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0.8"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景圆 -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)" filter="url(#glow)"/>

  <!-- 电影胶片元素 -->
  <g fill="none" stroke="#fff" stroke-width="12" stroke-linecap="round">
    <!-- 主胶片轮廓 -->
    <rect x="140" y="120" width="232" height="272" rx="20" fill="rgba(0,0,0,0.3)"/>

    <!-- 胶片孔 -->
    <rect x="155" y="140" width="24" height="32" rx="4" fill="#fff"/>
    <rect x="155" y="190" width="24" height="32" rx="4" fill="#fff"/>
    <rect x="155" y="240" width="24" height="32" rx="4" fill="#fff"/>
    <rect x="155" y="290" width="24" height="32" rx="4" fill="#fff"/>
    <rect x="155" y="340" width="24" height="32" rx="4" fill="#fff"/>

    <rect x="333" y="140" width="24" height="32" rx="4" fill="#fff"/>
    <rect x="333" y="190" width="24" height="32" rx="4" fill="#fff"/>
    <rect x="333" y="240" width="24" height="32" rx="4" fill="#fff"/>
    <rect x="333" y="290" width="24" height="32" rx="4" fill="#fff"/>
    <rect x="333" y="340" width="24" height="32" rx="4" fill="#fff"/>

    <!-- 播放按钮三角形 -->
    <path d="M235 200 L310 256 L235 312 Z" fill="#fff" stroke="none"/>

    <!-- AI 闪电元素 -->
    <path d="M280 150 L250 190 L275 190 L255 230 L295 180 L270 180 Z" fill="#00d2ff" stroke="none"/>
  </g>

  <!-- 外圈光效 -->
  <circle cx="256" cy="256" r="245" fill="none" stroke="url(#glowGradient)" stroke-width="4" opacity="0.6"/>
</svg>
